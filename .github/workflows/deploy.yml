name: Deploy to GitHub Pages

# Livraison : tout push sur `main` (typiquement le merge d'une PR develop → main)
# vérifie (types + tests), build et déploie sur GitHub Pages. Déclenchable aussi à la main.
on:
  push:
    branches: ['main']
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les runs en cours dépassés.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
